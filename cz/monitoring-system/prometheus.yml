global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts/stack.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # Nest หลัง start บางที /metrics ช้า — ขยาย timeout กันยัง FIRING ค้างแม้รันแล้ว
  - job_name: nestjs_app
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['backend:3000']

  - job_name: mongodb
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: blackbox_exporter
    static_configs:
      - targets: ['blackbox_exporter:9115']

  # API: จากใน Docker (service name) — baseline ว่าแอปขึ้น
  - job_name: api_probe_internal
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: [http://backend:3000/health]
        labels:
          probe_scope: internal_docker
          service: backend
          route: /health
      - targets: [http://backend:3000/events]
        labels:
          probe_scope: internal_docker
          service: backend
          route: /events
      - targets: [http://backend:3000/artists]
        labels:
          probe_scope: internal_docker
          service: backend
          route: /artists
      - targets: [http://frontend:3000/]
        labels:
          probe_scope: internal_docker
          service: frontend
          route: /
    relabel_configs: &blackbox_relabel
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  # API: ผ่าน host (พอร์ตที่ publish) — จับเคส asymmetric เทียบ internal (NAT / binding)
  # ไม่โพรบ frontend ที่ :5173 จากที่นี่ — Vite/dev มักไม่ตอบแบบที่ Blackbox คาดจากมุม host.docker.internal (ค้าง/ไม่ 200)
  # สถานะ frontend ใช้ job api_probe_internal (frontend:3000) + ใส่ URL จริงใน public-probes.json ถ้าต้องเทียบลูกค้า
  - job_name: api_probe_via_host
    metrics_path: /probe
    params:
      module: [http_2xx_slow]
    static_configs:
      - targets: [http://host.docker.internal:3000/health]
        labels:
          probe_scope: via_host_port
          service: backend
          route: /health
      - targets: [http://host.docker.internal:3000/events]
        labels:
          probe_scope: via_host_port
          service: backend
          route: /events
      - targets: [http://host.docker.internal:3000/artists]
        labels:
          probe_scope: via_host_port
          service: backend
          route: /artists
    relabel_configs: *blackbox_relabel

  # API: อินเทอร์เน็ต / โดเมนจริง — public-probes.json + services/*.json (ทีมละไฟล์)
  - job_name: api_probe_public
    metrics_path: /probe
    params:
      module: [http_2xx_slow]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/public-probes.json
          - /etc/prometheus/targets/services/*.json
        refresh_interval: 30s
    relabel_configs: *blackbox_relabel
